databases:
  - name: worldvision-db
    databaseName: worldvision
    user: worldvision
    plan: free

services:
  # ── Backend API (PHP/Laravel via Docker) ────────────────────────────────────
  - type: web
    name: worldvision-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: WorldVision
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://worldvision-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: worldvision-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: CORS_ALLOWED_ORIGINS
        value: https://worldvision-frontend.onrender.com
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

  # ── Frontend (React/Vite static site) ────────────────────────────────────────
  - type: web
    name: worldvision-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://worldvision-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
