services:
  # ── Frontend (React/Vite static site — always free on Render) ───────────────
  - type: web
    name: worldvision-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Update this after Railway deploys your backend.
        # Format: https://<your-project>.up.railway.app/api
        value: https://worldvision-api.up.railway.app/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
